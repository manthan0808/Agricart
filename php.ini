; Vercel PHP Runtime Configuration
; Limits memory per request to prevent OOM across concurrent invocations

memory_limit = 256M
max_execution_time = 30
max_input_time = 30
post_max_size = 16M
upload_max_filesize = 8M

; Session handling
session.gc_maxlifetime = 3600

; Error handling (suppress display in production)
display_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Extensions
extension = pdo
extension = pdo_pgsql
extension = pgsql
